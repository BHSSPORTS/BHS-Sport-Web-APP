<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>BHS Sports Hub - Access Required</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #cf0553;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Ensure full screen coverage */
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        /* Prevent any white spaces */
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      .passcode-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        padding: 3rem 2rem;
        text-align: center;
        max-width: 400px;
        width: 90%;
        margin: 0;
        /* Ensure perfect centering */
        position: relative;
        z-index: 1;
      }

      .logo-container {
        margin-bottom: 2rem;
      }

      .logo {
        height: 80px;
        width: auto;
        max-width: 200px;
        margin: 0 auto 1rem;
        display: block;
      }

      .title {
        color: #cf0553;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
      }

      .subtitle {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 2rem;
        font-weight: 400;
      }

      .input-field {
        margin-bottom: 1.5rem;
      }

      .input-field input {
        font-size: 1.2rem;
        text-align: center;
        font-weight: 500;
        color: #333;
        border: 3px solid #e0e0e0;
        border-radius: 15px;
        padding: 1rem;
        width: 100%;
        max-width: 280px;
        margin: 0 auto;
        transition: all 0.3s ease;
        font-family: "Poppins", sans-serif;
      }

      .input-field input:focus {
        outline: none;
        border-color: #cf0553;
        box-shadow: 0 0 0 3px rgba(207, 5, 83, 0.1);
        transform: translateY(-2px);
      }

      /* Mobile Optimizations */
      @media screen and (max-width: 768px) {
        .passcode-container {
          padding: 2rem 1.5rem;
          max-width: 350px;
          width: 95%;
        }

        .title {
          font-size: 2rem;
        }

        .subtitle {
          font-size: 1rem;
        }

        .logo {
          height: 60px;
          max-width: 150px;
        }

        .input-field input {
          font-size: 1.1rem;
          padding: 0.875rem;
          max-width: 250px;
        }
      }

      @media screen and (max-width: 480px) {
        .passcode-container {
          padding: 1.5rem 1rem;
          max-width: 300px;
          width: 98%;
        }

        .title {
          font-size: 1.8rem;
        }

        .subtitle {
          font-size: 0.9rem;
        }

        .logo {
          height: 50px;
          max-width: 120px;
        }

        .input-field input {
          font-size: 1rem;
          padding: 0.75rem;
          max-width: 220px;
        }
      }

      /* Enhanced Mobile Touch Targets */
      @media (pointer: coarse) {
        .input-field input,
        .button {
          min-height: 44px;
          min-width: 44px;
        }
      }

      .input-field input::placeholder {
        color: #ccc;
      }

      .submit-button {
        background-color: #cf0553;
        color: white;
        border: none;
        border-radius: 15px;
        padding: 1rem 2rem;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
        max-width: 280px;
        margin: 0 auto;
        font-family: "Poppins", sans-serif;
      }

      .submit-button:hover {
        background-color: #b00447;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(207, 5, 83, 0.3);
      }

      .submit-button:active {
        transform: translateY(0);
      }

      /* Modern Google Sign-In Styles */
      .auth-message {
        margin-bottom: 1.5rem;
        color: #666;
        font-size: 1rem;
      }

      .google-signin-container {
        margin-bottom: 2rem;
        display: flex;
        justify-content: center;
      }

      /* Modern Google Sign-In button styling */
      .google-signin-container .gsi-material-button {
        background: linear-gradient(135deg, #4285f4 0%, #34a853 100%) !important;
        border: none !important;
        border-radius: 12px !important;
        color: white !important;
        font-size: 1.1rem !important;
        font-weight: 500 !important;
        padding: 1rem 2rem !important;
        height: auto !important;
        min-width: 280px !important;
        font-family: "Poppins", sans-serif !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        box-shadow: 0 4px 20px rgba(66, 133, 244, 0.3) !important;
        position: relative !important;
        overflow: hidden !important;
      }

      .google-signin-container .gsi-material-button::before {
        content: '' !important;
        position: absolute !important;
        top: 0 !important;
        left: -100% !important;
        width: 100% !important;
        height: 100% !important;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent) !important;
        transition: left 0.5s !important;
      }

      .google-signin-container .gsi-material-button:hover::before {
        left: 100% !important;
      }

      .google-signin-container .gsi-material-button:hover {
        background: linear-gradient(135deg, #3367d6 0%, #2d8f47 100%) !important;
        transform: translateY(-3px) !important;
        box-shadow: 0 8px 30px rgba(66, 133, 244, 0.4) !important;
      }

      .google-signin-container .gsi-material-button:active {
        transform: translateY(-1px) !important;
        box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3) !important;
      }

      .alternative-access {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e0e0e0;
      }

      .alternative-text {
        color: #999;
        font-size: 0.85rem;
        margin: 0;
      }

      .error-message {
        color: #e74c3c;
        font-size: 1rem;
        margin-top: 1rem;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .error-message.show {
        opacity: 1;
      }

      .success-message {
        color: #27ae60;
        font-size: 1rem;
        margin-top: 1rem;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .success-message.show {
        opacity: 1;
      }

      .loading {
        display: none;
        margin: 1rem auto;
      }

      .loading.show {
        display: block;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #cf0553;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Mobile Optimizations */
      @media screen and (max-width: 768px) {
        .passcode-container {
          padding: 2rem 1.5rem;
          margin: 1rem;
          border-radius: 15px;
        }

        .logo {
          height: 60px;
          max-width: 150px;
        }

        .title {
          font-size: 2rem;
        }

        .subtitle {
          font-size: 1rem;
        }

        .input-field input {
          font-size: 1.1rem;
          padding: 0.8rem;
          max-width: 260px;
        }

        .submit-button {
          padding: 0.8rem 1.5rem;
          font-size: 1.1rem;
          max-width: 260px;
        }
      }

      @media screen and (max-width: 480px) {
        .passcode-container {
          padding: 1.5rem 1rem;
          margin: 0.5rem;
        }

        .logo {
          height: 50px;
          max-width: 120px;
        }

        .title {
          font-size: 1.8rem;
        }

        .subtitle {
          font-size: 0.9rem;
        }

        .input-field input {
          font-size: 1rem;
          padding: 0.7rem;
          max-width: 240px;
        }

        .submit-button {
          padding: 0.7rem 1.2rem;
          font-size: 1rem;
          max-width: 240px;
        }
      }
    </style>
  </head>
  <body>
    <div class="passcode-container">
      <div class="logo-container">
        <img src="logo/BH Logo Black.png" alt="BHS Logo" class="logo">
        <h1 class="title">BHS Sports Hub</h1>
      </div>

      <!-- Google Sign-In Section -->
      <div id="googleSignInSection">
        <div class="auth-message">
          <p>Sign in with Google</p>
        </div>
        
        <!-- Google Sign-In Container -->
        <div id="googleSignInContainer" class="google-signin-container"></div>
        
        <!-- Alternative access method (optional) -->
        <div class="alternative-access">
          <p class="alternative-text">Need help? Contact PE department</p>
        </div>
      </div>

      <div class="error-message" id="errorMessage">
        Invalid username or passcode. Please try again.
      </div>

      <div class="success-message" id="successMessage">
        Access granted! Redirecting...
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Load required scripts -->
    <script src="config.js"></script>
    <script src="google-auth.js"></script>
    <script>
      let googleAuth = null;

      // Check if user already has Google authentication
      function checkGoogleAuth() {
        try {
          const authData = localStorage.getItem('bhsGoogleAuth');
          if (authData) {
            const { user, token, timestamp } = JSON.parse(authData);
            
            // Check if session is still valid (24 hours)
            if (Date.now() - timestamp < 24 * 60 * 60 * 1000) {
              // Valid session, redirect to main site
              window.location.href = 'index.html';
              return true;
            } else {
              // Session expired, clear it
              localStorage.removeItem('bhsGoogleAuth');
            }
          }
        } catch (error) {
          console.error('Error checking Google auth:', error);
          localStorage.removeItem('bhsGoogleAuth');
        }
        return false;
      }

      // Initialize Google Authentication
      async function initializeGoogleAuth() {
        try {
          // Check if GoogleAuth is available
          if (typeof GoogleAuth === 'undefined') {
            throw new Error('GoogleAuth not available');
          }

          // Create Google Auth instance
          googleAuth = new GoogleAuth();
          
          // Set up callbacks
          googleAuth.onSignIn((user) => {
            console.log('User signed in:', user.name);
            showSuccessMessage(`Welcome ${user.name}! Redirecting...`);
            
            // Redirect to main app after successful sign-in
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1500);
          });
          
          googleAuth.onSignOut(() => {
            console.log('User signed out');
            // This shouldn't happen on the passcode page, but handle it gracefully
          });
          
          // Initialize with Client ID from config
          if (typeof BHS_CONFIG !== 'undefined' && BHS_CONFIG.GOOGLE_CLIENT_ID && BHS_CONFIG.GOOGLE_CLIENT_ID !== 'YOUR_GOOGLE_CLIENT_ID_HERE') {
            await googleAuth.initialize(BHS_CONFIG.GOOGLE_CLIENT_ID);
            console.log('Google Auth initialized successfully');
          } else {
            throw new Error('Google Client ID not configured');
          }
          
        } catch (error) {
          console.error('Failed to initialize Google Auth:', error);
          showErrorMessage('Authentication system not available. Please contact support.');
        }
      }

      // Show success message
      function showSuccessMessage(message) {
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        
        errorMessage.classList.remove('show');
        successMessage.textContent = message;
        successMessage.classList.add('show');
      }

      // Show error message
      function showErrorMessage(message) {
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        
        successMessage.classList.remove('show');
        errorMessage.textContent = message;
        errorMessage.classList.add('show');
      }

      // Page load
      document.addEventListener('DOMContentLoaded', async function() {
        // Check if user already has valid Google auth
        if (checkGoogleAuth()) {
          return; // Will redirect to main app
        }
        
        // Initialize Google authentication
        await initializeGoogleAuth();
      });
    </script>
      

    </body>
</html>
