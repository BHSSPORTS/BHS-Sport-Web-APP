<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen Generator - BHS Sports Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Mobile Safe Zone CSS -->
    <link rel="stylesheet" href="safe-zone.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #cf0553;
            margin-bottom: 20px;
        }
        .splash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .splash-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        .splash-item.generated {
            border-color: #28a745;
            background: #d4edda;
        }
        .splash-item.error {
            border-color: #dc3545;
            background: #f8d7da;
        }
        .btn {
            background: #cf0553;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
        }
        .btn:hover {
            background: #a80442;
        }
        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .progress {
            background: #e2e3e5;
            border-radius: 10px;
            height: 20px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: #cf0553;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .instructions {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
            border-left: 4px solid #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ BHS Sports Hub Splash Screen Generator</h1>
        
        <div class="instructions">
            <h3>📱 iOS Splash Screen Requirements:</h3>
            <p>iOS devices need multiple splash screen sizes for different orientations and screen densities. This tool will generate all the required sizes from your source image.</p>
        </div>
        
        <div class="splash-grid" id="splashGrid">
            <!-- Splash screens will be populated here -->
        </div>
        
        <button class="btn" onclick="generateAllSplashScreens()" id="generateBtn">Generate All Splash Screens</button>
        <button class="btn" onclick="checkExistingSplashScreens()">Check Existing Splash Screens</button>
        
        <div class="progress" id="progressContainer" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // iOS Splash Screen sizes and orientations
        const splashScreens = [
            // iPhone Portrait
            { width: 320, height: 568, name: "iPhone SE 1st gen", filename: "splash-320x568.png" },
            { width: 375, height: 667, name: "iPhone 6/7/8", filename: "splash-375x667.png" },
            { width: 390, height: 844, name: "iPhone 12/13/14", filename: "splash-390x844.png" },
            { width: 414, height: 896, name: "iPhone XR/11", filename: "splash-414x896.png" },
            { width: 428, height: 926, name: "iPhone 12/13/14 Pro Max", filename: "splash-428x926.png" },
            
            // iPhone Landscape
            { width: 568, height: 320, name: "iPhone SE 1st gen Landscape", filename: "splash-568x320.png" },
            { width: 667, height: 375, name: "iPhone 6/7/8 Landscape", filename: "splash-667x375.png" },
            { width: 844, height: 390, name: "iPhone 12/13/14 Landscape", filename: "splash-844x390.png" },
            { width: 896, height: 414, name: "iPhone XR/11 Landscape", filename: "splash-896x414.png" },
            { width: 926, height: 428, name: "iPhone 12/13/14 Pro Max Landscape", filename: "splash-926x428.png" },
            
            // iPad Portrait
            { width: 768, height: 1024, name: "iPad 9.7\"", filename: "splash-768x1024.png" },
            { width: 834, height: 1112, name: "iPad Pro 10.5\"", filename: "splash-834x1112.png" },
            { width: 834, height: 1194, name: "iPad Pro 11\"", filename: "splash-834x1194.png" },
            { width: 1024, height: 1366, name: "iPad Pro 12.9\"", filename: "splash-1024x1366.png" },
            
            // iPad Landscape
            { width: 1024, height: 768, name: "iPad 9.7\" Landscape", filename: "splash-1024x768.png" },
            { width: 1112, height: 834, name: "iPad Pro 10.5\" Landscape", filename: "splash-1112x834.png" },
            { width: 1194, height: 834, name: "iPad Pro 11\" Landscape", filename: "splash-1194x834.png" },
            { width: 1366, height: 1024, name: "iPad Pro 12.9\" Landscape", filename: "splash-1366x1024.png" }
        ];
        
        let generatedCount = 0;
        
        function createSplashGrid() {
            const grid = document.getElementById('splashGrid');
            grid.innerHTML = '';
            
            splashScreens.forEach(screen => {
                const item = document.createElement('div');
                item.className = 'splash-item';
                item.id = `splash-${screen.width}x${screen.height}`;
                item.innerHTML = `
                    <h3>${screen.width}×${screen.height}</h3>
                    <p><strong>${screen.name}</strong></p>
                    <p>Status: <span class="status-text">Pending</span></p>
                `;
                grid.appendChild(item);
            });
        }
        
        function updateSplashStatus(screen, status, message) {
            const item = document.getElementById(`splash-${screen.width}x${screen.height}`);
            const statusText = item.querySelector('.status-text');
            
            item.className = `splash-item ${status}`;
            statusText.textContent = message;
            
            if (status === 'generated') {
                generatedCount++;
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        
        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percent + '%';
        }
        
        function checkExistingSplashScreens() {
            generatedCount = 0;
            splashScreens.forEach(screen => {
                const img = new Image();
                img.onload = function() {
                    updateSplashStatus(screen, 'generated', '✅ Generated');
                };
                img.onerror = function() {
                    updateSplashStatus(screen, 'error', '❌ Missing');
                };
                img.src = `splash-screens/${screen.filename}`;
            });
        }
        
        function generateAllSplashScreens() {
            const generateBtn = document.getElementById('generateBtn');
            const progressContainer = document.getElementById('progressContainer');
            
            generateBtn.disabled = true;
            progressContainer.style.display = 'block';
            generatedCount = 0;
            
            showStatus('🔄 Generating splash screens...', 'success');
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            
            img.onload = function() {
                splashScreens.forEach((screen, index) => {
                    setTimeout(() => {
                        canvas.width = screen.width;
                        canvas.height = screen.height;
                        
                        // Clear canvas
                        ctx.clearRect(0, 0, screen.width, screen.height);
                        
                        // Fill with background color (your brand color)
                        ctx.fillStyle = '#cf0553';
                        ctx.fillRect(0, 0, screen.width, screen.height);
                        
                        // Calculate scaling to fit image while maintaining aspect ratio
                        const scale = Math.min(screen.width / img.width, screen.height / img.height);
                        const scaledWidth = img.width * scale;
                        const scaledHeight = img.height * scale;
                        
                        // Center the image
                        const x = (screen.width - scaledWidth) / 2;
                        const y = (screen.height - scaledHeight) / 2;
                        
                        // Draw the image
                        ctx.drawImage(img, x, y, scaledWidth, scaledHeight);
                        
                        // Convert to blob and download
                        canvas.toBlob(function(blob) {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = screen.filename;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            
                            updateSplashStatus(screen, 'generated', '✅ Generated');
                            
                            const progress = ((index + 1) / splashScreens.length) * 100;
                            updateProgress(progress);
                            
                            if (index + 1 === splashScreens.length) {
                                showStatus(`✅ All ${splashScreens.length} splash screens generated and downloaded!`, 'success');
                                generateBtn.disabled = false;
                                progressContainer.style.display = 'none';
                                
                                // Instructions for next steps
                                setTimeout(() => {
                                    showStatus(`📁 Please create a 'splash-screens' folder and move all downloaded splash screens there.`, 'success');
                                }, 2000);
                            }
                        }, 'image/png');
                    }, index * 100); // Stagger the generation
                });
            };
            
            img.onerror = function() {
                showStatus('❌ Error loading source image. Please check the file path.', 'error');
                generateBtn.disabled = false;
                progressContainer.style.display = 'none';
            };
            
            img.src = 'WebAppImages/SPORTSHUBSPLASH.png';
        }
        
        // Initialize the page
        window.onload = function() {
            createSplashGrid();
            checkExistingSplashScreens();
        };
    </script>
    

</body>
</html>
