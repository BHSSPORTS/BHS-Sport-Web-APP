<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator - BHS Sports Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #cf0553;
            margin-bottom: 20px;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .icon-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        .icon-item.generated {
            border-color: #28a745;
            background: #d4edda;
        }
        .icon-item.error {
            border-color: #dc3545;
            background: #f8d7da;
        }
        .btn {
            background: #cf0553;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
        }
        .btn:hover {
            background: #a80442;
        }
        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .progress {
            background: #e2e3e5;
            border-radius: 10px;
            height: 20px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: #cf0553;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Mobile Safe Zone CSS -->
    <link rel="stylesheet" href="safe-zone.css">
</head>
<body>
    <div class="container">
        <h1>🎯 BHS Sports Hub Icon Generator</h1>
        
        <p>This tool will generate all the required icon sizes for your Progressive Web App.</p>
        
        <div class="icon-grid" id="iconGrid">
            <!-- Icons will be populated here -->
        </div>
        
        <button class="btn" onclick="generateAllIcons()" id="generateBtn">Generate All Icons</button>
        <button class="btn" onclick="checkExistingIcons()">Check Existing Icons</button>
        
        <div class="progress" id="progressContainer" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const iconSizes = [72, 96, 128, 144, 152, 192, 384, 512];
        let generatedCount = 0;
        
        function createIconGrid() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            
            iconSizes.forEach(size => {
                const item = document.createElement('div');
                item.className = 'icon-item';
                item.id = `icon-${size}`;
                item.innerHTML = `
                    <h3>${size}x${size}</h3>
                    <p>Status: <span class="status-text">Pending</span></p>
                `;
                grid.appendChild(item);
            });
        }
        
        function updateIconStatus(size, status, message) {
            const item = document.getElementById(`icon-${size}`);
            const statusText = item.querySelector('.status-text');
            
            item.className = `icon-item ${status}`;
            statusText.textContent = message;
            
            if (status === 'generated') {
                generatedCount++;
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        
        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percent + '%';
        }
        
        function checkExistingIcons() {
            generatedCount = 0;
            iconSizes.forEach(size => {
                const img = new Image();
                img.onload = function() {
                    updateIconStatus(size, 'generated', '✅ Generated');
                };
                img.onerror = function() {
                    updateIconStatus(size, 'error', '❌ Missing');
                };
                img.src = `icons/icon-${size}x${size}.png`;
            });
        }
        
        function generateAllIcons() {
            const generateBtn = document.getElementById('generateBtn');
            const progressContainer = document.getElementById('progressContainer');
            
            generateBtn.disabled = true;
            progressContainer.style.display = 'block';
            generatedCount = 0;
            
            showStatus('🔄 Generating icons...', 'success');
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            
            img.onload = function() {
                iconSizes.forEach((size, index) => {
                    setTimeout(() => {
                        canvas.width = size;
                        canvas.height = size;
                        
                        ctx.clearRect(0, 0, size, size);
                        ctx.drawImage(img, 0, 0, size, size);
                        
                        canvas.toBlob(function(blob) {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `icon-${size}x${size}.png`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            
                            updateIconStatus(size, 'generated', '✅ Generated');
                            
                            const progress = ((index + 1) / iconSizes.length) * 100;
                            updateProgress(progress);
                            
                            if (index + 1 === iconSizes.length) {
                                showStatus(`✅ All ${iconSizes.length} icons generated and downloaded!`, 'success');
                                generateBtn.disabled = false;
                                progressContainer.style.display = 'none';
                                
                                // Instructions for next steps
                                setTimeout(() => {
                                    showStatus(`📁 Please move all downloaded icons to the 'icons' folder in your project.`, 'success');
                                }, 2000);
                            }
                        }, 'image/png');
                    }, index * 100); // Stagger the generation to avoid browser freezing
                });
            };
            
            img.onerror = function() {
                showStatus('❌ Error loading source image. Please check the file path.', 'error');
                generateBtn.disabled = false;
                progressContainer.style.display = 'none';
            };
            
            img.src = 'WebAppImages/Sports Hub (512 x 512 px).png';
        }
        
        // Initialize the page
        window.onload = function() {
            createIconGrid();
            checkExistingIcons();
        };
    </script>
    

</body>
</html>
