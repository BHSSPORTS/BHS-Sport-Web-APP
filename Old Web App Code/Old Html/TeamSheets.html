<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <body>
   <!-- Hero Section -->
<section class="hero is-large">
  <div class="hero-body">
    <div class="container has-text-centered">
      <h1 class="title has-text-white">Team Sheets</h1>
      <p class="subtitle has-text-white">Up to date Team Sheets, changing weekly.
      </p>
    </div>
  </div>
</section>
<div class="container section">
    <div class="container">
      <!-- Dropdown to Select a Team -->
      <div class="dropdown">
        <label for="teamSelector">Select a Team:</label>
        <select id="teamSelector">
          <option value="">-- Choose a Team --</option>
        </select>
      </div>

<div class="dropdown">
  <label for="teacherSelector">Filter by Teacher:</label>
  <select id="teacherSelector">
    <option value="">-- All Teachers --</option>
  </select>
</div>


      <!-- Download Button -->
      <div class="download-button-container">
        <button onclick="downloadPDF()">Download All Team Sheets</button>
      </div>

      <!-- Team Sheets Container -->
      <div id="teams-container"></div>
    </div>
    <script>
      // Fetch data from Google Apps Script Web App URL
      const fetchTeams = async () => {
  const url =
    "https://script.google.com/macros/s/AKfycbzvA70dCV-N2y4XX7hKU9edyPiN8mzsMguIsMqTF9CMihRb2FsNsYMu35auTQBSVld_lQ/exec"; // Replace with your deployed web app URL
  try {
    const response = await fetch(url);
    const teams = await response.json();

    // Populate the team selector
    const teamSelector = document.getElementById("teamSelector");
    teams.forEach((team, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = team.name;
      teamSelector.appendChild(option);
    });

// Add the getDayOfWeek function
  function getDayOfWeek(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-GB', { weekday: 'long' }); // e.g., 'Wednesday'
  }

  // Add the formatDate function
  function formatDate(dateString) {
    if (!dateString) return "";
    const options = { day: "numeric", month: "long", year: "numeric" };
    const date = new Date(dateString);
    return date.toLocaleDateString("en-GB", options); // e.g., '8 January 2025'
  }


    // Populate the teacher selector with unique teacher names
    const teacherSelector = document.getElementById("teacherSelector");
    const uniqueTeachers = [...new Set(teams.map(team => team.staff))]; // Get unique teacher names
    uniqueTeachers.forEach(teacher => {
      const option = document.createElement("option");
      option.value = teacher;
      option.textContent = teacher;
      teacherSelector.appendChild(option);
    });

    // Populate the teams container
    const container = document.getElementById("teams-container");
    teams.forEach((team, index) => {
      const teamDiv = document.createElement("div");
      teamDiv.classList.add("team");
      teamDiv.id = `team-${index}`;

      let footerMessage = "Prepared by the Sports Department";
      if (team.name.toLowerCase().includes("girls")) {
        footerMessage = "Any problems please speak to Mrs Burnett";
      } else if (team.name.toLowerCase().includes("boys")) {
        footerMessage = "Any problems please speak to Mr Mullins";
      }

      teamDiv.innerHTML = `
    <img src="https://static.wixstatic.com/media/762576_f4198f8a54f74e17bc1582edccf914a2.gif" alt="Logo" />
    <h2>${team.name}</h2>
    
    <!-- Team Details Grid -->
<div class="team-details">
  <div><strong>Sport:</strong> ${team.sport}</div>
  <div><strong>Opponent:</strong> ${team.opponent}</div>
  <div><strong>Day:</strong> ${getDayOfWeek(team.date)}</div>
  <div><strong>Date:</strong> ${formatDate(team.date)}</div>
  <div><strong>Start Time:</strong> ${team.startTime}</div>
  <div><strong>Venue:</strong> ${team.venue}</div>
</div>
    <!-- Player List -->
    <ul class="player-list">
      ${team.players.map(player => `<li>${player}</li>`).join("")}
    </ul>

    <!-- Change Section Grid -->
    <div class="change-details">
      <div><strong>Change:</strong> ${team.change}</div>
      <div><strong>Leave:</strong> ${team.leave}</div>
      <div><strong>Back at BHS:</strong> ${team.backAtBHS}</div>
      <div><strong>Teacher:</strong> ${team.staff}</div>
    </div>

    <!-- Footer -->
    <div class="team-footer">
      <p><em>${footerMessage}</em></p>
    </div>
  `;
      container.appendChild(teamDiv);
    });

    // Add event listener for team filter
    teamSelector.addEventListener("change", () => filterTeams(teams));

    // Add event listener for teacher filter
    document.getElementById("teacherSelector").addEventListener("change", () => filterTeams(teams));
  } catch (error) {
    console.error("Error fetching team data:", error);
  }
};

function filterTeams(teams) {
  const selectedTeamIndex = document.getElementById("teamSelector").value;
  const selectedTeacher = document.getElementById("teacherSelector").value;


  // Filter teams based on selected filters
  teams.forEach((team, index) => {
    const teamDiv = document.getElementById(`team-${index}`);
    const matchesTeam = selectedTeamIndex === "" || selectedTeamIndex == index;
    const matchesTeacher = selectedTeacher === "" || team.staff === selectedTeacher;

    if (matchesTeam && matchesTeacher) {
      teamDiv.classList.add("active");
    } else {
      teamDiv.classList.remove("active");
    }
  });
}


      // Helper function to format date strings
      function formatDate(dateString) {
        if (!dateString) return "";
        const options = { weekday: "long", day: "numeric", month: "long", year: "numeric" };
        const date = new Date(dateString);
        return date.toLocaleDateString("en-GB", options);
      }

      // Download all team sheets as a PDF
async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4"); // A4 portrait mode

// Show the loading spinner
  const spinner = document.getElementById("loading-spinner");
  spinner.style.display = "flex";

  try {
    const teams = document.querySelectorAll(".team");

    if (teams.length === 0) {
      alert("No team sheets to download.");
      return;
    }

    for (let i = 0; i < teams.length; i++) {
      const team = teams[i];

      // Clone the team and wrap it in a padded container
      const paddedContainer = document.createElement("div");
      paddedContainer.style.paddingTop = "30px"; // Add padding to avoid clipping
paddedContainer.style.paddingBottom = "10px";
      paddedContainer.style.backgroundColor = "white";
      paddedContainer.style.width = "794px"; // A4 width in pixels
      paddedContainer.style.minHeight = "1123px"; // A4 height in pixels
      paddedContainer.style.display = "flex";
      paddedContainer.style.alignItems = "center";
      paddedContainer.style.justifyContent = "center";

      const clonedTeam = team.cloneNode(true);
      clonedTeam.style.margin = "0";
      clonedTeam.style.display = "block";

      paddedContainer.appendChild(clonedTeam);
      document.body.appendChild(paddedContainer); // Temporarily add to the DOM

      // Capture the padded container
      const canvas = await html2canvas(paddedContainer, {
        scale: 2, // High resolution
        useCORS: true,
      });

      // Remove the container after capturing
      document.body.removeChild(paddedContainer);

      // Convert the canvas to an image
      const imgData = canvas.toDataURL("image/png");

      // Calculate dimensions to fit the content onto A4
      const imgWidth = 180; // A4 width in mm minus margins
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      // Center the image on the A4 page
      const xOffset = (210 - imgWidth) / 2; // Center horizontally
      const yOffset = 10; // Center vertically

      // Add the image to the PDF
      pdf.addImage(imgData, "PNG", xOffset, yOffset, imgWidth, imgHeight);

      // Add a new page if it's not the last team
      if (i < teams.length - 1) {
        pdf.addPage();
      }
    }

    // Save the PDF
    pdf.save("Team_Sheets.pdf");
  } catch (error) {
    console.error("Error generating PDF:", error);
    alert("An error occurred while generating the PDF.");
  } finally {
    // Hide the spinner
    spinner.style.display = "none";
  }
}


      // Load teams when the page loads
      window.onload = fetchTeams;
    </script>
<div id="loading-spinner" class="spinner">
  <div class="spinner-circle"></div>
  <p>Generating PDF...</p>
</div>
