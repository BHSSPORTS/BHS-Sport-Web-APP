<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Performance Analytics</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Mobile Safe Zone CSS -->
    <link rel="stylesheet" href="../safe-zone.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: "Poppins", Arial, sans-serif;
        background-color: #f4f6f9;
        color: #333;
      }

      h1.title {
        font-size: 2.5rem;
        font-weight: 700;
        color: #cf0553;
      }

      .section {
        padding: 30px 20px;
      }

      .stat-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        padding: 20px;
        text-align: center;
        font-size: 1.2rem;
        font-weight: 600;
      }

      .chart-container {
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        padding: 20px;
        margin-bottom: 20px;
      }

      .filter-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
      }
.stat-card {
  flex-grow: 1; /* Allow cards to grow based on content */
  min-width: 300px; /* Minimum width for smaller screens */
  max-width: none; /* Remove fixed max-width constraint */
  padding: 20px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  text-align: center;
  font-size: 1.2rem;
  font-weight: 600;
  word-wrap: break-word; /* Ensure long text wraps within the box */
}

.stats-section {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start; /* Align cards to the left */
  gap: 20px;
}

.hero {
    background-image: url('https://www.barrowhills.org/wp-content/uploads/2024/12/Barrow-Hills-284-768x768.jpg');
    background-size: cover;
    background-position: center;
    position: relative;
    color: white;
    min-height: 150px; /* Minimum height for the section */
    max-height: 200px; /* Maximum height to ensure it doesn't get too large */
    display: flex; /* Flexbox for centering content */
    align-items: center; /* Vertically center */
    justify-content: center; /* Horizontally center */
    overflow: hidden; /* Ensures content doesn't overflow beyond max-height */
}
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6); /* Dark overlay for better text visibility */
    z-index: 0;
  }

  .hero-body {
    position: relative;
    z-index: 1; /* Ensure content is above the overlay */
text-align: center; /* Center text */
    padding: 10px; /* Minimal padding for spacing */
  }

  .hero .title,
  .hero .subtitle {
    color: white;
text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); /* Adds a subtle shadow for better readability */
  }

    </style>
  </head>
  <body>
    <!-- Hero Section -->
<section class="hero is-large">
  <div class="hero-body">
    <div class="container has-text-centered">
      <h1 class="title has-text-white">Performance Analytics</h1>
      <p class="subtitle has-text-white">
        Insights into team performance and opposition statistics
      </p>
    </div>
  </div>
</section>
<!-- Date Range Filter -->
<section class="section">
  <div class="columns is-centered">
    <!-- Start Date -->
    <div class="column is-one-quarter">
      <div class="field">
        <label class="label" for="startDate">Start Date</label>
        <div class="control">
          <input
            type="date"
            id="startDate"
            class="input"
            placeholder="Select Start Date"
          />
        </div>
      </div>
    </div>

    <!-- End Date -->
    <div class="column is-one-quarter">
      <div class="field">
        <label class="label" for="endDate">End Date</label>
        <div class="control">
          <input
            type="date"
            id="endDate"
            class="input"
            placeholder="Select End Date"
          />
        </div>
      </div>
    </div>

    <!-- Filter Button -->
    <div class="column is-narrow">
      <div class="field">
        <label class="label">&nbsp;</label>
        <div class="control">
          <button
            class="button is-fullwidth"
            style="background-color: #cf0553; color: #fff; border-color: #cf0553;"
            onmouseover="this.style.backgroundColor='#a90443';"
            onmouseout="this.style.backgroundColor='#cf0553';"
            onclick="applyDateFilter()"
          >
            Apply Filter
          </button>
        </div>
      </div>
    </div>
  </div>
</section>


    <!-- Filters Section -->
    <section class="section">
      <div class="filter-container">
        <!-- Gender Filter -->
        <div class="control">
          <div class="select">
            <select id="genderFilter" onchange="updateFilters()">
              <option value="">All Genders</option>
              <option value="Boys">Boys</option>
              <option value="Girls">Girls</option>
            </select>
          </div>
        </div>

        <!-- Sport Filter -->
        <div class="control">
          <div class="select">
            <select id="sportFilter" onchange="updateFilters()">
              <option value="">All Sports</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Stats Overview Section -->
    <section class="section">
      <div class="container">
        <h2 class="title is-4 has-text-centered">Top Performing Teams</h2>
        <div class="stats-section">
          <!-- Top Teams Card -->
          <div class="stat-card" id="most-wins">
            Most Wins: <span style="color: #28a745;">Loading...</span>
          </div>
          <div class="stat-card" id="best-win-percentage">
            Best Win Percentage: <span style="color: #28a745;">Loading...</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Charts Section -->
    <section class="section">
      <div class="container">
        <div class="columns">
          <!-- Top Opposition Chart -->
          <div class="column">
            <div class="chart-container">
              <h2>Top Opponents Faced</h2>
              <canvas id="topOpponentsChart"></canvas>
            </div>
          </div>

          <!-- Win Percentage Chart -->
          <div class="column">
            <div class="chart-container">
              <h2>Team Win Percentage</h2>
              <canvas id="teamWinChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
  const GOOGLE_SHEETS_API_URL =
    "https://script.google.com/macros/s/AKfycbzDhVb7Z4AF8Fbj67_MqJuHXUK7oMKfzEiTMzUIZhYtzMU_cIbOVFJPfVYki_mb25RlEA/exec?type=fixtureResults";

  let sheetData = [];
  let filteredData = [];

  async function fetchData() {
    try {
      const response = await fetch(GOOGLE_SHEETS_API_URL);
      if (!response.ok) throw new Error("Failed to fetch data.");
      sheetData = await response.json();

      populateSportFilter();
      updateFilters(); // Initial load with all data
    } catch (error) {
      console.error("Error fetching data:", error);
      alert("Failed to load data. Please try again.");
    }
  }

  function populateSportFilter() {
    const sportFilter = document.getElementById("sportFilter");
    const uniqueSports = [...new Set(sheetData.map((row) => row.Sport))];
    sportFilter.innerHTML =
      '<option value="">All Sports</option>' +
      uniqueSports
        .map((sport) => `<option value="${sport}">${sport}</option>`)
        .join("");
  }

  function updateFilters() {
    const gender = document.getElementById("genderFilter").value;
    const sport = document.getElementById("sportFilter").value;

    filteredData = sheetData.filter((row) => {
      return (!gender || row.Gender === gender) && (!sport || row.Sport === sport);
    });

    populateTopPerformingTeams();
    populateTopOppositionChart();
    populateTeamWinChart();
  }

  function applyDateFilter() {
  const startDate = document.getElementById("startDate").value
    ? new Date(document.getElementById("startDate").value)
    : null;
  const endDate = document.getElementById("endDate").value
    ? new Date(document.getElementById("endDate").value)
    : null;

  // Filter sheetData by date range first
  let dateFilteredData = sheetData.filter((row) => {
    const fixtureDate = new Date(row["Date of Fixture"]);
    if (isNaN(fixtureDate)) return false; // Skip invalid dates
    return (
      (!startDate || fixtureDate >= startDate) &&
      (!endDate || fixtureDate <= endDate)
    );
  });

  // Now apply gender and sport filters on top of the date-filtered data
  const gender = document.getElementById("genderFilter").value;
  const sport = document.getElementById("sportFilter").value;

  filteredData = dateFilteredData.filter((row) => {
    return (!gender || row.Gender === gender) && (!sport || row.Sport === sport);
  });

  // Update visuals based on combined filters
  populateTopPerformingTeams();
  populateTopOppositionChart();
  populateTeamWinChart();
}

  function populateTopPerformingTeams() {
  const teamStats = {};
  
  // Calculate Wins and Matches for each team
  filteredData.forEach((row) => {
    const teamKey = `${row.Gender} - ${row.Team}`;
    if (!teamStats[teamKey]) teamStats[teamKey] = { Wins: 0, Matches: 0 };
    teamStats[teamKey].Matches++;
    if (row.Result === "Win") teamStats[teamKey].Wins++;
  });

  // Sort by Wins for "Most Wins"
  const sortedTeamsByWins = Object.entries(teamStats).sort(
    (a, b) => b[1].Wins - a[1].Wins
  );

  const topTeam = sortedTeamsByWins[0] || ["N/A", { Wins: 0 }];

  // Sort by Win Percentage for "Best Win Percentage"
  const sortedTeamsByWinPercentage = Object.entries(teamStats)
    .filter(([, stats]) => stats.Matches > 0) // Avoid division by zero
    .sort((a, b) => (b[1].Wins / b[1].Matches) - (a[1].Wins / a[1].Matches));

  const bestWinPercentageTeam = sortedTeamsByWinPercentage[0] || ["N/A", { Wins: 0, Matches: 0 }];
  const winPercentage = ((bestWinPercentageTeam[1].Wins / bestWinPercentageTeam[1].Matches) * 100).toFixed(2);

  // Update the Most Wins card
  document.getElementById("most-wins").innerHTML = `Most Wins: <span style="color: #28a745;">${topTeam[0]} (${topTeam[1].Wins} Wins)</span>`;

  // Update the Best Win Percentage card
  document.getElementById("best-win-percentage").innerHTML = `Best Win Percentage: <span style="color: #28a745;">${bestWinPercentageTeam[0]} (${winPercentage}%)</span>`;
}

  function populateTopOppositionChart() {
    const oppositionCount = {};
    filteredData.forEach((row) => {
      if (!oppositionCount[row.Opposition]) oppositionCount[row.Opposition] = 0;
      oppositionCount[row.Opposition]++;
    });

    const ctx = document.getElementById("topOpponentsChart").getContext("2d");
    new Chart(ctx, {
      type: "bar",
      data: {
        labels: Object.keys(oppositionCount),
        datasets: [
          {
            label: "Matches",
            data: Object.values(oppositionCount),
            backgroundColor: "#cf0553",
          },
        ],
      },
    });
  }

  function populateTeamWinChart() {
    const winPercentage = {};
    filteredData.forEach((row) => {
      const key = `${row.Gender} - ${row.Team}`;
      if (!winPercentage[key]) winPercentage[key] = { Wins: 0, Matches: 0 };
      winPercentage[key].Matches++;
      if (row.Result === "Win") winPercentage[key].Wins++;
    });

    const ctx = document.getElementById("teamWinChart").getContext("2d");
    new Chart(ctx, {
      type: "bar",
      data: {
        labels: Object.keys(winPercentage),
        datasets: [
          {
            label: "Win %",
            data: Object.values(winPercentage).map(
              (w) => (w.Wins / w.Matches) * 100
            ),
            backgroundColor: "#28a745",
          },
        ],
      },
    });
  }

  fetchData();
</script>

  </body>
</html>
