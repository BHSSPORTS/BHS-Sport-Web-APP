<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator - BHS Sports Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Mobile Safe Zone CSS -->
    <link rel="stylesheet" href="safe-zone.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #cf0553;
            margin-bottom: 20px;
        }
        .instructions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .btn {
            background: #cf0553;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
        }
        .btn:hover {
            background: #a80442;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 BHS Sports Hub Icon Generator</h1>
        
        <div class="instructions">
            <h3>Instructions:</h3>
            <ol>
                <li>Make sure your icon images are in the WebAppImages folder</li>
                <li>Click "Generate All Icons" below</li>
                <li>All required icon sizes will be downloaded automatically</li>
                <li>Move the downloaded icons to the "icons" folder</li>
            </ol>
        </div>
        
        <button class="btn" onclick="generateAllIcons()">Generate All Icons</button>
        <button class="btn" onclick="checkFiles()">Check Files</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const iconSizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        
        function checkFiles() {
            // Check if source images exist
            const img = new Image();
            img.onload = function() {
                showStatus('✅ Source images found! Ready to generate icons.', 'success');
            };
            img.onerror = function() {
                showStatus('❌ Source images not found. Please check WebAppImages folder.', 'error');
            };
            img.src = 'WebAppImages/Sports Hub (512 x 512 px).png';
        }
        
        function generateAllIcons() {
            showStatus('🔄 Generating icons...', 'success');
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            
            img.onload = function() {
                let generated = 0;
                
                iconSizes.forEach(size => {
                    canvas.width = size;
                    canvas.height = size;
                    
                    ctx.clearRect(0, 0, size, size);
                    ctx.drawImage(img, 0, 0, size, size);
                    
                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `icon-${size}x${size}.png`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        
                        generated++;
                        if (generated === iconSizes.length) {
                            showStatus(`✅ All ${iconSizes.length} icons generated and downloaded!`, 'success');
                        }
                    }, 'image/png');
                });
            };
            
            img.onerror = function() {
                showStatus('❌ Error loading source image. Please check the file path.', 'error');
            };
            
            img.src = 'WebAppImages/Sports Hub (512 x 512 px).png';
        }
        
        // Check files on page load
        window.onload = function() {
            checkFiles();
        };
    </script>
    

</body>
</html>
