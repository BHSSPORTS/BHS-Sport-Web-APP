<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting to Dashboard...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- PWA Manifest & App Capability -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shortener">

  <!-- Apple Touch Icons (Home screen icons for iOS) -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <!-- Standard Favicons -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f0f2f5;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 3rem 2rem;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      max-width: 400px;
      width: 90%;
    }
    .spinner {
      position: relative;
      width: 56px;
      height: 56px;
      margin: 0 auto 24px auto;
    }
    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(153, 0, 0, 0.08);
      border-radius: 50%;
    }
    .spinner-dot {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: #990000;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 8px 0;
      font-weight: 700;
      color: #990000;
    }
    p {
      font-size: 0.95rem;
      color: #475569;
      margin: 0;
      font-weight: 500;
    }
  </style>
  <script>
    // Register PWA service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }

    // Configuration: Redirect directly to your Google Apps Script Dashboard
    const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/barrowhills.org/s/AKfycbyt5vDQoRvSHRSqXNjT1n50UgH7ERNtXpBubS6OTF3I/dev';
    
    // Redirect immediately
    window.location.replace(APPS_SCRIPT_URL);
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-dot"></div>
    </div>
    <h1>Opening Dashboard</h1>
    <p>Connecting to URL Shortener Admin Panel...</p>
  </div>
</body>
</html>
