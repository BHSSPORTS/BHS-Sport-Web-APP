<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting to Dashboard...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0b0f19;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      max-width: 400px;
      width: 90%;
    }
    .spinner {
      position: relative;
      width: 56px;
      height: 56px;
      margin: 0 auto 24px auto;
    }
    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(99, 102, 241, 0.1);
      border-radius: 50%;
    }
    .spinner-dot {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 10px 0;
      font-weight: 600;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 0.9rem;
      color: #94a3b8;
      margin: 0;
    }
  </style>
  <script>
    // Configuration: Redirect directly to your Google Apps Script Dashboard
    const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/barrowhills.org/s/AKfycbxIBvTGet8gNlWgRgKESCbOzI-AbM5I0GGCJvcs2cIeoTIfW7FOA5-_qADHATevFuRt/exec';
    
    // Redirect immediately
    window.location.replace(APPS_SCRIPT_URL);
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-dot"></div>
    </div>
    <h1>Opening Dashboard</h1>
    <p>Connecting to URL Shortener Admin Panel...</p>
  </div>
</body>
</html>
