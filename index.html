<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PWA Manifest & App Capability -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shortener">

  <!-- Apple Touch Icons (Home screen icons for iOS) -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <!-- Standard Favicons -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0f19;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      max-width: 400px;
      width: 90%;
    }
    .spinner {
      position: relative;
      width: 56px;
      height: 56px;
      margin: 0 auto 24px auto;
    }
    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(99, 102, 241, 0.1);
      border-radius: 50%;
    }
    .spinner-dot {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 10px 0;
      font-weight: 600;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 0.9rem;
      color: #94a3b8;
      margin: 0 0 20px 0;
      word-break: break-all;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-dot"></div>
    </div>
    <h1>Opening Dashboard</h1>
    <p>Connecting to URL Shortener Admin Panel...</p>
  </div>

  <script>
    // Register PWA service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((reg) => console.log('PWA Service Worker registered.', reg))
          .catch((err) => console.error('Service Worker registration failed.', err));
      });
    }

    // Configuration: Redirect directly to your Google Apps Script Dashboard
    const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/barrowhills.org/s/AKfycbyt5vDQoRvSHRSqXNjT1n50UgH7ERNtXpBubS6OTF3I/dev';
    
    // Redirect immediately
    window.location.replace(APPS_SCRIPT_URL);
  </script>
</body>
</html>
